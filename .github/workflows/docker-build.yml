name: Build & Push Docker image

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/nulp-ai-enterprise/advert-front

jobs:
  typecheck:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --frozen-lockfile
      - run: npx tsc --noEmit
        env:
          BACKEND_URL: "http://localhost:8080"

  build-and-push:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1

      - name: Pin SHA in deployment manifest
        run: |
          SHA="${{ steps.meta.outputs.sha_tag }}"
          sed -i "s|image: ghcr.io/nulp-ai-enterprise/advert-front:.*|image: ghcr.io/nulp-ai-enterprise/advert-front:${SHA}|" k8s/deployment.yaml
          git config user.email "ci@noreply.github.com"
          git config user.name "GitHub CI"
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No change to deployment.yaml" && exit 0
          git commit -m "ci: pin image to ${SHA} [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:"${{ github.ref_name }}"
