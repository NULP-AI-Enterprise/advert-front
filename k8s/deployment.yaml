apiVersion: apps/v1
kind: Deployment
metadata:
  name: advert-front
  namespace: advert-front
  labels:
    app: advert-front
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: advert-front
  template:
    metadata:
      labels:
        app: advert-front
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: advert-front
          image: ghcr.io/nulp-ai-enterprise/advert-front:sha-0e07ba0
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                secretKeyRef:
                  name: advert-front-secret
                  key: NEXT_PUBLIC_WS_URL
            - name: BACKEND_URL
              valueFrom:
                secretKeyRef:
                  name: advert-front-secret
                  key: BACKEND_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: advert-front-secret
                  key: DATABASE_URL
            - name: ENRICHMENT_URL
              valueFrom:
                secretKeyRef:
                  name: advert-front-secret
                  key: ENRICHMENT_URL
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
