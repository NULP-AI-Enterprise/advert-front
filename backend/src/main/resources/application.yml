spring:
  application:
    name: advertising-backend

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/advertising_db}
    username: ${DB_USERNAME:advertising_user}
    password: ${DB_PASSWORD:advertising_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com/v1
  model:
    chat: gpt-4o
    embedding: text-embedding-3-small
  max-tokens: 4096
  temperature: 0.7
  timeout-seconds: 60

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars-long}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  websocket:
    allowed-origins: "http://localhost:3000"
    endpoint: /ws/chat
  redis:
    session-ttl-hours: 24
    chat-history-key-prefix: "chat:session:"
  recommendation:
    max-results: 10
    similarity-threshold: 0.35
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 100

logging:
  level:
    com.advertising: INFO
    org.springframework.web.socket: WARN
    org.springframework.web.reactive.function.client: DEBUG
