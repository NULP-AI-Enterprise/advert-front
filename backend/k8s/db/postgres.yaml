apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: advert-postgres
  namespace: advert-back
  labels:
    app: advert-postgres
spec:
  serviceName: advert-postgres
  replicas: 1
  selector:
    matchLabels:
      app: advert-postgres
  template:
    metadata:
      labels:
        app: advert-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: advert-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: advert-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advert-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-scripts
          configMap:
            name: advert-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: advert-postgres
  namespace: advert-back
  labels:
    app: advert-postgres
spec:
  type: ClusterIP
  selector:
    app: advert-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
