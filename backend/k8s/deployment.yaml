apiVersion: apps/v1
kind: Deployment
metadata:
  name: advert-back
  namespace: advert-back
  labels:
    app: advert-back
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: advert-back
  template:
    metadata:
      labels:
        app: advert-back
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: advert-back
          image: ghcr.io/nulp-ai-enterprise/advert-back:latest
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: OPENAI_API_KEY
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: REDIS_PORT
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: SMTP_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: JWT_SECRET
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: advert-back-secret
                  key: FRONTEND_URL
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
