apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: advert-back
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NULP-AI-Enterprise/advert-back
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: advert-back
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
